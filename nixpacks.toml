[phases.setup]
nixPkgs = [
  "php82",
  "php82Packages.composer",
  "php82Extensions.simplexml",
  "php82Extensions.curl",
  "php82Extensions.mbstring",
  "php82Extensions.xml",
  "php82Extensions.zip",
  "php82Extensions.pdo",
  "php82Extensions.pdo_sqlite",
  "php82Extensions.pdo_mysql",
  "php82Extensions.redis",
  "nodejs_20"
]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm ci"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan storage:link && php artisan serve --host=0.0.0.0 --port=$PORT"
